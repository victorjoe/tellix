name: Build and release Tellix.exe

# Triggers:
#  - Push a tag like v1.0.0   -> builds and attaches the .exe to the matching
#    GitHub Release (auto-creating the release if it doesn't exist).
#  - Run workflow manually     -> builds and uploads as a workflow artifact only.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Download LGPL FFmpeg
        shell: pwsh
        run: |
          # Use BtbN's LGPL build so the bundled .exe stays MIT-compatible.
          # GPL builds (the more common gyan.dev ones) would force the whole
          # bundle to be redistributed under GPL terms; we want to avoid that.
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2024-12-31-12-48/ffmpeg-n7.1-16-g07566c98b4-win64-lgpl-7.1.zip"
          $expectedSha256 = "${{ vars.FFMPEG_SHA256 }}"
          if ([string]::IsNullOrWhiteSpace($expectedSha256)) {
            throw "Repository variable FFMPEG_SHA256 must contain the pinned FFmpeg archive SHA256."
          }
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          $actualSha256 = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256.ToLowerInvariant()) {
            throw "FFmpeg archive hash mismatch. Expected $expectedSha256 but got $actualSha256"
          }
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extract
          $exe = Get-ChildItem -Path ffmpeg-extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item $exe.FullName bin/ffmpeg.exe
          (Get-FileHash bin/ffmpeg.exe -Algorithm SHA256).Hash.ToLowerInvariant() | Set-Content -NoNewline bin/ffmpeg.exe.sha256
          Write-Host "ffmpeg.exe size: $((Get-Item bin/ffmpeg.exe).Length / 1MB) MB"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build Tellix.exe
        run: python -m PyInstaller tellix.spec --clean --noconfirm

      - name: Report build size
        shell: pwsh
        run: |
          $size = (Get-Item dist/Tellix.exe).Length / 1MB
          Write-Host "Tellix.exe size: $([math]::Round($size, 1)) MB"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874
        with:
          name: Tellix-exe
          path: dist/Tellix.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@9d7c94cfd0a1f3ed45544c887983e9fa900f0564
        with:
          files: dist/Tellix.exe
          generate_release_notes: true
          draft: false
          prerelease: false
