name: Build and release Tellix.exe

# Triggers:
#  - Push a tag like v1.0.0   -> builds and attaches the .exe to the matching
#    GitHub Release (auto-creating the release if it doesn't exist).
#  - Run workflow manually     -> builds and uploads as a workflow artifact only.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed by softprops/action-gh-release to upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Download LGPL FFmpeg
        shell: pwsh
        run: |
          # Use BtbN's LGPL build so the bundled .exe stays MIT-compatible.
          # GPL builds (the more common gyan.dev ones) would force the whole
          # bundle to be redistributed under GPL terms; we want to avoid that.
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extract
          $exe = Get-ChildItem -Path ffmpeg-extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item $exe.FullName bin/ffmpeg.exe
          Write-Host "ffmpeg.exe size: $((Get-Item bin/ffmpeg.exe).Length / 1MB) MB"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Tellix.exe
        run: python -m PyInstaller tellix.spec --clean --noconfirm

      - name: Report build size
        shell: pwsh
        run: |
          $size = (Get-Item dist/Tellix.exe).Length / 1MB
          Write-Host "Tellix.exe size: $([math]::Round($size, 1)) MB"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tellix-exe
          path: dist/Tellix.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Tellix.exe
          generate_release_notes: true
          draft: false
          prerelease: false
